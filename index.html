<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Bespoke Web Craftsmanship</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts for Victorian Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Use the new generated Victorian/Steampunk background image */
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Parallax effect to keep art framed */
            color: #d8c3a5; /* Aged parchment text */
            font-family: 'Playfair Display', serif;
        }
        
        .victorian-card {
            border: 6px double #785f47; /* Antique brass double border */
            padding: 4rem 2rem;
            /* Dark, slightly transparent background so the panel pops against the detailed art */
            background-color: rgba(26, 23, 21, 0.96); 
            box-shadow: 0 15px 45px rgba(0,0,0,0.95); 
            border-radius: 0; 
        }

        h1 {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            color: #e8d8c3; 
        }

        .ornament {
            font-size: 1.8rem;
            color: #785f47;
            margin: 1rem 0;
            user-select: none;
        }

        .subtitle {
            letter-spacing: 3px;
            font-size: 0.85rem;
            color: #c9b5a1; 
        }

        .btn-victorian {
            background-color: transparent;
            border: 1px solid #785f47;
            color: #d8c3a5;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .btn-victorian:hover {
            background-color: #785f47;
            color: #1a1715;
        }
    </style>
</head>
<body class="vh-100 d-flex align-items-center justify-content-center">

    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-11 col-md-8 col-lg-6">
                
                <div class="victorian-card">
                    <div class="ornament">&#10048;</div>
                    
                    <h1 class="display-5 mt-3 mb-4 text-uppercase">Coming Soon</h1>
                    
                    <p class="fst-italic fs-5 mb-4">
                        The digital parlour is currently being assembled.
                    </p>
                    
                    <div class="ornament fs-6 mb-4">&#11825; &nbsp; &#11825;</div>

                    <p class="text-uppercase subtitle mb-5">
                        <strong class="text-white">Bespoke Web Craftsmanship</strong><br>
                        Independent Artisan
                    </p>

                    <a href="mailto:your-email@example.com" class="btn btn-victorian rounded-0 px-4 py-2 text-uppercase fs-6">
                        Leave a Calling Card
                    </a>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
